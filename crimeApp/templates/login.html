<!DOCTYPE HTML>
<html lang="zxx">

<head>
	<title>Login</title>
	<!-- Meta tag Keywords -->
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta charset="UTF-8" />
	<meta name="keywords" content="Classic Sign In Form Responsive Widget,Login form widgets, Sign up Web forms , Login signup Responsive web form,Flat Pricing table,Flat Drop downs,Registration Forms,News letter Forms,Elements"
	/>
	<script>
		addEventListener("load", function () {
			setTimeout(hideURLbar, 0);
		}, false);

		function hideURLbar() {
			window.scrollTo(0, 1);
		}
	</script>
	<!-- Meta tag Keywords -->
	<!-- css files -->
	<link rel="stylesheet" href="/static/web/css/style.css" type="text/css" media="all" />
	 <link rel="stylesheet" href="/static/assets/css/sweetalert.css">
 <script src="/static/assets/js/sweetalert-dev.js"></script>
	<!-- Style-CSS -->
	<link rel="stylesheet" href="/static/web/css/fontawesome-all.css">
	<!-- Font-Awesome-Icons-CSS -->
	<!-- //css files -->
	<!-- web-fonts -->
	<link href="//fonts.googleapis.com/css?family=Reem+Kufi&amp;subset=arabic" rel="stylesheet">
	<link href="//fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i,800,800i" rel="stylesheet">
	<!-- //web-fonts -->
	 <style>.form-style-agile input[type="email"],
.form-style-agile input[type="password"]{
    width: 100%;
    height: 50px;
    padding: 10px 15px;
    font-size: 16px;
    box-sizing: border-box;
}
</style>
</head>

<body>
	<!-- title -->
	<h1>
		
		<span>S</span>ign
		<span>I</span>n
		<span>H</span>ere</h1>
	<!-- //title -->
	<!-- content -->
	<div class="sub-main-w3">
		<form action="/login/" method="post">
			{% csrf_token %}
			<div class="form-style-agile">
				<label>
					Email
					<i class="fas fa-user"></i>
				</label>
				<input placeholder="Email" name="username" type="email" required="">
			</div>
			<div class="form-style-agile">
				<label>
					Password
					<i class="fas fa-unlock-alt"></i>
				</label>
				<input placeholder="Password" name="password" type="password" required="">
			</div>
			<!-- checkbox -->
			<div class="wthree-text">
				<ul>
					<li>
						<a href="/register/">Register</a>
					</li>
					<li>
						<a href="/">Home</a>
					</li>
				</ul>
			</div>
			<!-- //switch -->
			<input type="submit" value="Log In">
		</form>
	</div>
	<!-- //content -->

	<!-- copyright -->
	<!-- <div class="footer">
		<p>&copy; 2018 Classic Sign In Form. All rights reserved | Design by
			<a href="http://w3layouts.com">W3layouts</a>
		</p>
	</div> -->
	<!-- //copyright -->

</body>
 {% if error %}
<script type="text/javascript">
  swal("Error!", "{{error}}", "error");
</script>
{% endif %}

{% if success %}
<script type="text/javascript">
  swal("Congrats!", "{{success}}", "success");
</script>
{% endif %}

{% if info %}
<script type="text/javascript">
  swal("Information!", "{{info}}", "info");
</script>
{% endif %}
</html>

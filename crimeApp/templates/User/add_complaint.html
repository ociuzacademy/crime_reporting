{% extends 'User/header_footer.html' %}

{% block content %}

<style>

.complaint-section{
    padding: 60px 0;
    background: #f5f7fa;
}

.complaint-card{
    background: #fff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.complaint-title{
    text-align: center;
    margin-bottom: 35px;
    font-size: 34px;
    font-weight: 700;
    color: #222;
}

.form-row-custom{
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.form-row-custom .field{
    flex: 1;
}

.field label{
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #444;
}

.field input,
.field select,
.field textarea{
    width: 100%;
    padding: 14px;
    border: 1px solid #dcdcdc;
    border-radius: 8px;
    font-size: 15px;
    transition: 0.3s;
    background: #fff;
}

.field input:focus,
.field select:focus,
.field textarea:focus{
    border-color: #ff5a00;
    outline: none;
    box-shadow: 0 0 5px rgba(255,90,0,0.3);
}

.field textarea{
    height: 140px;
    resize: none;
}

.submit-btn{
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(to right,#ff5a00,#ff7b00);
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.submit-btn:hover{
    transform: translateY(-2px);
}

@media(max-width:768px){

    .form-row-custom{
        flex-direction: column;
    }

    .complaint-card{
        padding: 25px;
    }

}

</style>

<section class="complaint-section">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-10">

                <div class="complaint-card">

                    <h2 class="complaint-title">
                        Complaint Registration Form
                    </h2>

                    <form action="/add_complaint/"
                          method="post"
                          enctype="multipart/form-data"
                          onsubmit="return validateForm()">

                        {% csrf_token %}

                        <!-- Row 1 -->
                        <div class="form-row-custom">

                            <div class="field">

                                <label>Petitioner Name</label>

                                <input type="text"
                                       name="petitioner_name"
                                       placeholder="Enter petitioner name"
                                       required>

                            </div>

                            <div class="field">

                                <label>ID Proof</label>

                                <select name="petitioner_id"
                                        id="mySelect123"
                                        required>

                                    <option value="">
                                        Select ID Proof
                                    </option>

                                    <option value="Adhar Card">
                                        Adhar Card
                                    </option>

                                    <option value="Pan Card">
                                        Pan Card
                                    </option>

                                    <option value="Voter ID">
                                        Voter ID
                                    </option>

                                    <option value="Other">
                                        Other
                                    </option>

                                </select>

                            </div>

                        </div>

                        <!-- Row 2 -->
                        <div class="form-row-custom">

                            <div class="field">

                                <label>ID Proof Number</label>

                                <input type="text"
                                       name="petitioner_id_no"
                                       placeholder="Enter ID number"
                                       required>

                            </div>

                            <div class="field">

                                <label>Email Address</label>

                                <input type="email"
                                       name="petitioner_email"
                                       placeholder="Enter email"
                                       required>

                            </div>

                        </div>

                        <!-- Row 3 -->
                        <div class="form-row-custom">

                            <div class="field">

                                <label>Phone Number</label>

                                <input type="tel"
                                       name="petitioner_phone"
                                       pattern="[1-9]{1}[0-9]{9}"
                                       maxlength="10"
                                       placeholder="Enter phone number"
                                       required>

                            </div>

                            <div class="field">

                                <label>Address</label>

                                <input type="text"
                                       name="petitioner_address"
                                       placeholder="Enter address"
                                       required>

                            </div>

                        </div>

                        <!-- Row 4 -->
                        <div class="form-row-custom">

                            <div class="field">

                                <label>State</label>

                                <input type="text"
                                       name="petitioner_state"
                                       placeholder="Enter state"
                                       required>

                            </div>

                            <div class="field">

                                <label>District</label>

                                <input type="text"
                                       name="petitioner_district"
                                       placeholder="Enter district"
                                       required>

                            </div>

                        </div>

                        <!-- Row 5 -->
                        <div class="form-row-custom">

                            <div class="field">

                                <label>PIN Code</label>

                                <input type="text"
                                       name="petitioner_pin"
                                       placeholder="Enter PIN code"
                                       required>

                            </div>

                            <div class="field">

                                <label>Police Station</label>

                                <select name="police_station_name"
                                        id="mySelect22"
                                        required>

                                    <option value="">
                                        Select Police Station
                                    </option>

                                    {% for x in var %}

                                    <option value="{{x.Plc_Name}}">
                                        {{x.Plc_Name}}
                                    </option>

                                    {% endfor %}

                                </select>

                            </div>

                        </div>

                        <!-- Subject -->
                        <div class="field mb-3">

                            <label>Subject</label>

                            <input type="text"
                                   name="subject"
                                   placeholder="Enter complaint subject"
                                   required>

                        </div>

                        <!-- Upload -->
                        <div class="field mb-3">

                            <label>Upload Complaint Image</label>

                            <input type="file"
                                   name="pic_complaint"
                                   required>

                        </div>

                        <!-- Description -->
                        <div class="field mb-4">

                            <label>Description</label>

                            <textarea name="description"
                                      placeholder="Describe your complaint..."
                                      required></textarea>

                        </div>

                        <!-- Submit -->
                        <button type="submit"
                                class="submit-btn">

                            Submit Complaint

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% if error %}
<script>
swal("Error!", "{{error}}", "error");
</script>
{% endif %}

{% if success %}
<script>
swal("Success!", "{{success}}", "success");
</script>
{% endif %}

<script>

function validateForm(){

    let proof = document.getElementById("mySelect123").value;
    let station = document.getElementById("mySelect22").value;

    if(proof == ""){

        alert("Please select ID proof");
        return false;

    }

    if(station == ""){

        alert("Please select police station");
        return false;

    }

    return true;
}

</script>

{% endblock %}
